name: 'NTN-in-a-Box'
description: 'Run commands under simulated satellite network conditions'
branding:
  icon: 'radio'
  color: 'blue'
inputs:
  profile:
    description: 'Profile name (e.g. leo_pass_90s) or path to a YAML file. Required unless replay is set.'
  command:
    description: 'Command to run under NTN conditions'
    required: true
  replay:
    description: 'Path to a JSONL recording to replay instead of using a profile. Required unless profile is set.'
  speed:
    description: 'Replay speed multiplier'
    default: '1'
  record:
    description: 'Path to save a recording of this session'
runs:
  using: 'composite'
  steps:
    - name: Install ntnbox
      shell: bash
      run: |
        # Skip if already installed (e.g. pre-built earlier in the job).
        if command -v ntnbox &>/dev/null; then
          exit 0
        fi
        # Install iproute2 and iptables if not available.
        if ! command -v tc &>/dev/null || ! command -v iptables &>/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq iproute2 iptables >/dev/null
        fi
        # Build ntnbox from source.
        cd "$GITHUB_ACTION_PATH"
        go build -o /tmp/ntnbox ./cmd/ntnbox/
        sudo cp /tmp/ntnbox /usr/local/bin/ntnbox

    - name: Run under NTN conditions
      shell: bash
      env:
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_REPLAY: ${{ inputs.replay }}
        INPUT_SPEED: ${{ inputs.speed }}
        INPUT_RECORD: ${{ inputs.record }}
      run: |
        if [ -n "$INPUT_REPLAY" ]; then
          exec sudo env "PATH=$PATH" ntnbox replay \
            --file "$INPUT_REPLAY" \
            --speed "${INPUT_SPEED:-1}" \
            -- sh -c "$INPUT_COMMAND"
        fi

        if [ -z "$INPUT_PROFILE" ]; then
          echo "::error::either 'profile' or 'replay' input is required"
          exit 1
        fi

        # Profile resolution: contains slash → path; otherwise built-in.
        profile="$INPUT_PROFILE"
        case "$profile" in
          */*) ;;
          *)   profile="${GITHUB_ACTION_PATH}/testdata/profiles/${profile}.yaml" ;;
        esac

        if [ ! -f "$profile" ]; then
          echo "::error::profile not found: $profile"
          exit 1
        fi

        args=(--profile "$profile")
        if [ -n "$INPUT_RECORD" ]; then
          args+=(--record "$INPUT_RECORD")
        fi

        exec sudo env "PATH=$PATH" ntnbox run "${args[@]}" -- sh -c "$INPUT_COMMAND"
