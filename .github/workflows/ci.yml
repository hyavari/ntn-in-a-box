name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Full `make check` also runs golangci-lint; that currently reports
      # pre-existing issues. CI gates on the green subset until lint is clean.
      - name: check-fmt vet test build
        run: make check-fmt vet test build

      - name: golangci-lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: ./...
