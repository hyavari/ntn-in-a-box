name: Action Smoke Test
on:
  push:
    paths:
      - "action.yml"
      - "cmd/ntnbox/**"
      - "internal/**"
      - "testdata/**"
      - ".github/workflows/ntn-action-smoke.yml"
  pull_request:
    paths:
      - "action.yml"
      - "cmd/ntnbox/**"
      - "internal/**"
      - "testdata/**"
      - ".github/workflows/ntn-action-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Pre-build so the action's install step is a no-op.
      - name: Pre-build ntnbox
        run: |
          go build -o /tmp/ntnbox ./cmd/ntnbox/
          sudo cp /tmp/ntnbox /usr/local/bin/ntnbox

      - name: Test with built-in profile
        uses: ./
        with:
          profile: leo_pass_90s
          command: echo "hello from NTN"

      - name: Test toolchain PATH preserved
        uses: ./
        with:
          profile: leo_pass_90s
          command: go version

      - name: Test with replay
        uses: ./
        with:
          replay: testdata/sessions/smoke.jsonl
          speed: "100"
          command: echo "replayed"

  smoke-download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest release tag
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Using release ${tag}"

      - name: Test download install
        uses: ./
        with:
          ntnbox-version: ${{ steps.latest.outputs.tag }}
          profile: leo_pass_90s
          command: echo "hello from release ntnbox"
