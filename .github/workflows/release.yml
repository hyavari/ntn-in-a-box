name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ntnbox (linux/amd64)
        run: |
          CGO_ENABLED=0 go build -trimpath -o ntnbox-linux-amd64 ./cmd/ntnbox/
          sha256sum ntnbox-linux-amd64 > ntnbox-linux-amd64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ntnbox-linux-amd64
            ntnbox-linux-amd64.sha256
          generate_release_notes: true
