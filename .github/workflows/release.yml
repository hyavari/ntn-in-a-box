name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build multi-arch ntnbox binaries
        run: |
          set -euo pipefail
          build() {
            local goos="$1" goarch="$2" asset="$3"
            echo "building ${asset} (${goos}/${goarch})"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -o "$asset" ./cmd/ntnbox/
            sha256sum "$asset" > "${asset}.sha256"
          }
          build linux amd64 ntnbox-linux-amd64
          build linux arm64 ntnbox-linux-arm64
          build darwin arm64 ntnbox-darwin-arm64
          ls -la ntnbox-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ntnbox-linux-amd64
            ntnbox-linux-amd64.sha256
            ntnbox-linux-arm64
            ntnbox-linux-arm64.sha256
            ntnbox-darwin-arm64
            ntnbox-darwin-arm64.sha256
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
